<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0a0a0f" />
  <title>SPORT LOG</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Bebas+Neue&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #0a0a0f; color: #f0f0f5; font-family: 'Noto Sans JP', sans-serif; -webkit-tap-highlight-color: transparent; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #0a0a0f; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
    input, select, textarea, button { font-family: 'Noto Sans JP', sans-serif; outline: none; }
    button { cursor: pointer; border: none; }

    #app { max-width: 480px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }

    .header {
      background: linear-gradient(135deg, #0d0d1a 0%, #12121f 100%);
      border-bottom: 1px solid #1e1e30;
      padding: 48px 20px 0;
      position: sticky; top: 0; z-index: 10;
    }
    .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .header-title { font-family: 'Bebas Neue'; font-size: 28px; letter-spacing: 2px; color: #fff; }
    .header-sub { font-size: 11px; color: #666; letter-spacing: 1px; }
    .header-cost-label { font-size: 11px; color: #666; text-align: right; }
    .header-cost-value { font-family: 'Bebas Neue'; font-size: 22px; color: #fff; letter-spacing: 1px; text-align: right; }
    .tabs { display: flex; gap: 2px; }
    .tab-btn { flex: 1; padding: 10px 0; background: transparent; color: #666; font-weight: 700; font-size: 12px; border-radius: 8px 8px 0 0; transition: all .2s; }
    .tab-btn.active { background: #fff; color: #0a0a0f; }

    .content { flex: 1; padding: 16px; overflow-y: auto; }

    .filter-chips { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
    .chip { padding: 6px 14px; border-radius: 20px; background: #1a1a2e; color: #aaa; font-size: 12px; font-weight: 700; transition: all .2s; border: none; }

    .records { display: flex; flex-direction: column; gap: 10px; }
    .record-card { background: #12121f; border-radius: 14px; padding: 14px 16px; border: 1px solid #1e1e30; position: relative; overflow: hidden; animation: fadeUp .3s ease forwards; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
    .record-bar { position: absolute; left: 0; top: 0; bottom: 0; width: 4px; border-radius: 14px 0 0 14px; }
    .record-top { display: flex; justify-content: space-between; align-items: center; }
    .record-left { display: flex; gap: 10px; align-items: center; }
    .record-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
    .record-label { font-size: 13px; font-weight: 700; }
    .record-date { font-size: 11px; color: #666; margin-top: 2px; }
    .record-cost { font-family: 'Bebas Neue'; font-size: 20px; color: #fff; letter-spacing: 1px; }
    .record-memo { margin-top: 10px; font-size: 12px; color: #888; padding-left: 50px; line-height: 1.5; }
    .delete-btn { background: #ff474720; color: #FF4757; border-radius: 8px; padding: 5px 10px; font-size: 11px; font-weight: 700; margin-left: 8px; }

    .empty { text-align: center; padding: 60px 0; color: #444; }
    .empty-icon { font-size: 48px; margin-bottom: 12px; }
    .empty-text { font-size: 14px; }
    .empty-sub { font-size: 12px; margin-top: 6px; }

    .form-section { margin-bottom: 16px; }
    .form-label { font-size: 11px; color: #888; margin-bottom: 8px; letter-spacing: 1px; text-transform: uppercase; }
    .activity-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
    .activity-btn { padding: 14px 0; border-radius: 12px; background: #1a1a2e; color: #666; font-weight: 700; font-size: 12px; transition: all .2s; border: 2px solid #1e1e30; display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .activity-btn.selected { color: #fff; }
    .activity-btn span.emoji { font-size: 22px; }
    .form-input { width: 100%; background: #1a1a2e; border: 1px solid #1e1e30; border-radius: 12px; padding: 14px 16px; color: #fff; font-size: 14px; }
    .form-input::placeholder { color: #555; }
    .cost-wrap { position: relative; }
    .cost-prefix { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: #666; font-size: 16px; font-weight: 700; }
    #cost-input { padding-left: 36px; font-family: 'Bebas Neue'; font-size: 18px; letter-spacing: 1px; }
    textarea.form-input { resize: none; line-height: 1.6; }
    .save-btn { width: 100%; padding: 16px; border-radius: 14px; color: #fff; font-weight: 900; font-size: 15px; transition: all .2s; letter-spacing: 0.5px; }
    .save-btn:disabled { opacity: 0.4; background: #1a1a2e !important; }

    .stats-total { background: #12121f; border-radius: 16px; padding: 20px; margin-bottom: 16px; border: 1px solid #1e1e30; text-align: center; }
    .stats-label { font-size: 11px; color: #666; letter-spacing: 1px; margin-bottom: 6px; }
    .stats-num { font-family: 'Bebas Neue'; font-size: 52px; line-height: 1; color: #fff; }
    .stats-unit { font-size: 11px; color: #666; margin-top: 4px; }
    .stats-divider { height: 1px; background: #1e1e30; margin: 16px 0; }
    .stats-total-cost { font-family: 'Bebas Neue'; font-size: 36px; color: #fff; letter-spacing: 1px; }
    .stat-cards { display: flex; flex-direction: column; gap: 10px; }
    .stat-card { background: #12121f; border-radius: 14px; padding: 16px; border: 1px solid #1e1e30; }
    .stat-card-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .stat-left { display: flex; gap: 10px; align-items: center; }
    .stat-emoji { font-size: 24px; }
    .stat-name { font-weight: 700; font-size: 14px; }
    .stat-count { font-size: 11px; color: #666; }
    .stat-right { text-align: right; }
    .stat-total-cost { font-family: 'Bebas Neue'; font-size: 20px; letter-spacing: 1px; }
    .stat-avg { font-size: 11px; color: #666; }
    .progress-track { background: #0a0a0f; border-radius: 4px; height: 6px; overflow: hidden; }
    .progress-bar { height: 100%; border-radius: 4px; transition: width 0.6s ease; }
    .progress-pct { font-size: 10px; color: #555; margin-top: 4px; }

    .cat-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
    .cat-item { background: #12121f; border-radius: 14px; padding: 14px 16px; border: 1px solid #1e1e30; display: flex; align-items: center; gap: 12px; }
    .cat-icon-box { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
    .cat-info { flex: 1; }
    .cat-name { font-weight: 700; font-size: 14px; }
    .cat-badge { font-size: 10px; color: #555; margin-top: 2px; }
    .cat-delete-btn { background: #ff474720; color: #FF4757; border-radius: 8px; padding: 6px 10px; font-size: 11px; font-weight: 700; flex-shrink: 0; }

    .add-cat-box { background: #12121f; border-radius: 16px; padding: 18px; border: 1px solid #1e1e30; }
    .add-cat-title { font-size: 14px; font-weight: 700; margin-bottom: 14px; color: #ccc; }
    .emoji-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; margin-bottom: 14px; }
    .emoji-opt { background: #1a1a2e; border-radius: 8px; padding: 7px 0; font-size: 18px; text-align: center; border: 2px solid transparent; transition: all .15s; }
    .emoji-opt.selected { border-color: #fff; background: #2a2a3e; }
    .color-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 6px; margin-bottom: 14px; }
    .color-opt { height: 26px; border-radius: 6px; border: 2px solid transparent; transition: all .15s; }
    .color-opt.selected { border-color: #fff; transform: scale(1.1); }
    .add-cat-btn { width: 100%; padding: 13px; border-radius: 12px; background: #2a2a3e; color: #555; font-weight: 700; font-size: 14px; transition: all .2s; border: 1px solid #333; }
    .add-cat-btn.ready { background: #fff; color: #0a0a0f; border-color: #fff; }

    .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #2ED573; color: #0a0a0f; padding: 10px 20px; border-radius: 20px; font-weight: 700; font-size: 13px; animation: toastIn .3s ease; z-index: 100; white-space: nowrap; }
    @keyframes toastIn { from { opacity:0; transform: translateX(-50%) translateY(10px); } to { opacity:1; transform: translateX(-50%) translateY(0); } }

    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 50; display: flex; align-items: flex-end; justify-content: center; animation: fadeIn .2s; }
    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
    .modal-box { background: #12121f; border-radius: 20px 20px 0 0; padding: 24px 20px 40px; width: 100%; max-width: 480px; border-top: 1px solid #2a2a3e; animation: slideUp .25s ease; }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .modal-title { font-size: 16px; font-weight: 900; margin-bottom: 12px; }
    .modal-msg { font-size: 13px; color: #aaa; line-height: 1.7; }
    .modal-btns { display: flex; gap: 8px; margin-top: 20px; }
    .modal-cancel { flex: 1; padding: 13px; border-radius: 12px; background: #1a1a2e; color: #aaa; font-weight: 700; font-size: 14px; }
    .modal-confirm { flex: 1; padding: 13px; border-radius: 12px; background: #FF4757; color: #fff; font-weight: 700; font-size: 14px; }
  </style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-top">
      <div>
        <div class="header-title">SPORT LOG</div>
        <div class="header-sub">FITNESS TRACKER</div>
      </div>
      <div>
        <div class="header-cost-label">累計コスト</div>
        <div class="header-cost-value" id="total-cost">¥0</div>
      </div>
    </div>
    <div class="tabs">
      <button class="tab-btn active" data-view="list"  onclick="switchView('list')">記録</button>
      <button class="tab-btn"        data-view="add"   onclick="switchView('add')">追加</button>
      <button class="tab-btn"        data-view="stats" onclick="switchView('stats')">統計</button>
      <button class="tab-btn"        data-view="cats"  onclick="switchView('cats')">カテゴリ</button>
    </div>
  </div>
  <div class="content" id="content"></div>
</div>

<script>
// ── constants ─────────────────────────────────────────────
const RECORDS_KEY = 'sport-log-records-v2';
const CATS_KEY    = 'sport-log-cats-v2';

const DEFAULT_CATS = [
  { id:'gym',     label:'筋トレ',     icon:'💪', color:'#FF4757', isDefault:true },
  { id:'golf',    label:'ゴルフ',     icon:'⛳', color:'#2ED573', isDefault:true },
  { id:'running', label:'ランニング', icon:'🏃', color:'#1E90FF', isDefault:true },
];

const EMOJIS = ['🏋️','⚽','🏀','🎾','🏊','🚴','🧘','🥊','🏐','🎿','🏸','🤸','🧗','🎣','🏓','🏒','🏌️','🤽','🚣','🎽','🥋','🏹','🛹','🛼','🏄','🤾','🏇','⛷️'];
const COLORS = ['#FF4757','#FF6B81','#FF9F43','#FFC312','#A3CB38','#2ED573','#1E90FF','#7158E2','#F79F1F','#009432','#1289A7','#5758BB','#ED4C67','#006266','#EA2027','#C4E538'];

// ── state ─────────────────────────────────────────────────
let records        = [];
let cats           = [];
let currentView    = 'list';
let filterActivity = 'all';
let formData       = { date: today(), activityId: null, cost: '', memo: '' };
let newCat         = { label:'', icon: EMOJIS[0], color: COLORS[0] };
let pendingDelCatId = null;

// ── utils ─────────────────────────────────────────────────
function today()       { return new Date().toISOString().split('T')[0]; }
function fmtCost(n)    { return '¥' + Number(n).toLocaleString(); }
function fmtDate(d)    { const [y,m,day]=d.split('-'); return `${y}年${m}月${day}日`; }
function esc(s)        { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function rgba(hex,a)   { const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16); return `rgba(${r},${g},${b},${a})`; }
function getCat(id)    { return cats.find(c=>c.id===id); }
function totalCost()   { return records.reduce((s,r)=>s+r.cost,0); }

// ── storage ───────────────────────────────────────────────
function load() {
  try { records = JSON.parse(localStorage.getItem(RECORDS_KEY)||'[]'); } catch { records=[]; }
  try {
    const s = JSON.parse(localStorage.getItem(CATS_KEY));
    cats = (s && s.length) ? s : DEFAULT_CATS.map(c=>({...c}));
  } catch { cats = DEFAULT_CATS.map(c=>({...c})); }
  if (!formData.activityId && cats.length) formData.activityId = cats[0].id;
}
function saveRecords() { localStorage.setItem(RECORDS_KEY, JSON.stringify(records)); }
function saveCats()    { localStorage.setItem(CATS_KEY,    JSON.stringify(cats)); }

// ── routing ───────────────────────────────────────────────
function switchView(v) {
  currentView = v;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector(`[data-view="${v}"]`).classList.add('active');
  render();
}
function render() {
  document.getElementById('total-cost').textContent = fmtCost(totalCost());
  const c = document.getElementById('content');
  if      (currentView==='list')  c.innerHTML = renderList();
  else if (currentView==='add')   c.innerHTML = renderAdd();
  else if (currentView==='stats') c.innerHTML = renderStats();
  else if (currentView==='cats')  c.innerHTML = renderCats();
}

// ── LIST ──────────────────────────────────────────────────
function renderList() {
  const filtered = filterActivity==='all' ? records : records.filter(r=>r.activityId===filterActivity);

  const chips = [
    `<button class="chip" style="${filterActivity==='all'?'background:#fff;color:#0a0a0f':''}" onclick="setFilter('all')">すべて</button>`,
    ...cats.map(c=>{
      const on = filterActivity===c.id;
      return `<button class="chip" style="${on?`background:${c.color};color:#fff`:'color:#aaa'}" onclick="setFilter('${c.id}')">${c.icon} ${esc(c.label)}</button>`;
    })
  ].join('');

  const empty = `<div class="empty"><div class="empty-icon">📋</div><div class="empty-text">記録がありません</div><div class="empty-sub">「追加」から記録を入れましょう</div></div>`;

  const cards = filtered.map((r,i)=>{
    const act = getCat(r.activityId);
    const label = act ? esc(act.label) : '削除済み';
    const icon  = act ? act.icon : '❓';
    const color = act ? act.color : '#666';
    return `
      <div class="record-card" style="animation-delay:${i*.04}s">
        <div class="record-bar" style="background:${color}"></div>
        <div class="record-top">
          <div class="record-left">
            <div class="record-icon" style="background:${rgba(color,.12)};border:1px solid ${rgba(color,.2)}">${icon}</div>
            <div>
              <div class="record-label" style="color:${color}">${label}</div>
              <div class="record-date">${fmtDate(r.date)}</div>
            </div>
          </div>
          <div style="display:flex;align-items:center">
            <div class="record-cost">${fmtCost(r.cost)}</div>
            <button class="delete-btn" onclick="deleteRecord(${r.id})">削除</button>
          </div>
        </div>
        ${r.memo?`<div class="record-memo">${esc(r.memo)}</div>`:''}
      </div>`;
  }).join('');

  return `<div class="filter-chips">${chips}</div><div class="records">${filtered.length===0?empty:cards}</div>`;
}

// ── ADD ───────────────────────────────────────────────────
function renderAdd() {
  if (!formData.activityId && cats.length) formData.activityId = cats[0].id;

  const actBtns = cats.map(c=>{
    const sel = formData.activityId===c.id;
    return `<button class="activity-btn${sel?' selected':''}" style="${sel?`background:${c.color};border-color:${c.color}`:''}" onclick="setActivity('${c.id}')">
      <span class="emoji">${c.icon}</span><span>${esc(c.label)}</span>
    </button>`;
  }).join('');

  const selCat = getCat(formData.activityId);
  const color  = selCat ? selCat.color : '#555';
  const canSave = formData.date && formData.cost && formData.activityId;

  return `
    <div>
      <div style="margin-bottom:20px">
        <div style="font-size:18px;font-weight:900;margin-bottom:4px">新規記録</div>
        <div style="font-size:12px;color:#666">トレーニングの記録を追加します</div>
      </div>
      <div class="form-section">
        <div class="form-label">種目</div>
        ${cats.length===0
          ? `<div style="color:#666;font-size:13px;padding:8px 0">カテゴリがありません。「カテゴリ」タブから追加してください。</div>`
          : `<div class="activity-grid">${actBtns}</div>`}
      </div>
      <div class="form-section">
        <div class="form-label">日付</div>
        <input type="date" class="form-input" value="${formData.date}" oninput="formData.date=this.value" />
      </div>
      <div class="form-section">
        <div class="form-label">コスト（円）</div>
        <div class="cost-wrap">
          <span class="cost-prefix">¥</span>
          <input id="cost-input" type="number" class="form-input" placeholder="0" value="${esc(formData.cost)}" oninput="formData.cost=this.value" />
        </div>
      </div>
      <div class="form-section">
        <div class="form-label">メモ（任意）</div>
        <textarea class="form-input" rows="3" placeholder="内容・感想など..." oninput="formData.memo=this.value">${esc(formData.memo)}</textarea>
      </div>
      <button class="save-btn" style="background:${color}" onclick="addRecord()" ${canSave?'':'disabled'}>記録を保存する</button>
    </div>`;
}

// ── STATS ─────────────────────────────────────────────────
function renderStats() {
  const total = records.length;
  const cost  = totalCost();
  const statCards = cats.map(c=>{
    const recs  = records.filter(r=>r.activityId===c.id);
    const count = recs.length;
    const tot   = recs.reduce((s,r)=>s+r.cost,0);
    const avg   = count ? Math.round(tot/count) : 0;
    const pct   = total ? (count/total*100).toFixed(0) : 0;
    return `
      <div class="stat-card">
        <div class="stat-card-top">
          <div class="stat-left">
            <span class="stat-emoji">${c.icon}</span>
            <div>
              <div class="stat-name" style="color:${c.color}">${esc(c.label)}</div>
              <div class="stat-count">${count}回</div>
            </div>
          </div>
          <div class="stat-right">
            <div class="stat-total-cost">${fmtCost(tot)}</div>
            <div class="stat-avg">平均 ${fmtCost(avg)}/回</div>
          </div>
        </div>
        <div class="progress-track"><div class="progress-bar" style="width:${pct}%;background:${c.color}"></div></div>
        <div class="progress-pct">${pct}%</div>
      </div>`;
  }).join('');

  return `
    <div>
      <div style="margin-bottom:20px">
        <div style="font-size:18px;font-weight:900;margin-bottom:4px">統計</div>
        <div style="font-size:12px;color:#666">全期間の記録サマリー</div>
      </div>
      <div class="stats-total">
        <div class="stats-label">TOTAL RECORDS</div>
        <div class="stats-num">${total}</div>
        <div class="stats-unit">回のトレーニング</div>
        <div class="stats-divider"></div>
        <div class="stats-label">TOTAL COST</div>
        <div class="stats-total-cost">${fmtCost(cost)}</div>
      </div>
      <div class="stat-cards">${statCards.length ? statCards : '<div style="color:#555;font-size:13px">カテゴリがありません</div>'}</div>
    </div>`;
}

// ── CATEGORIES ────────────────────────────────────────────
function renderCats() {
  const catList = cats.length ? cats.map(c=>`
    <div class="cat-item">
      <div class="cat-icon-box" style="background:${rgba(c.color,.15)};border:1px solid ${rgba(c.color,.25)}">${c.icon}</div>
      <div class="cat-info">
        <div class="cat-name" style="color:${c.color}">${esc(c.label)}</div>
        ${c.isDefault?`<div class="cat-badge">デフォルト</div>`:''}
      </div>
      <button class="cat-delete-btn" onclick="confirmDeleteCat('${c.id}')">削除</button>
    </div>`).join('')
    : `<div style="color:#555;font-size:13px;padding:8px 0">カテゴリがありません</div>`;

  const emojiGrid = EMOJIS.map(e=>
    `<button class="emoji-opt${newCat.icon===e?' selected':''}" onclick="selEmoji('${e}')">${e}</button>`
  ).join('');

  const colorGrid = COLORS.map(col=>
    `<button class="color-opt${newCat.color===col?' selected':''}" style="background:${col}" onclick="selColor('${col}')"></button>`
  ).join('');

  const canAdd = newCat.label.trim().length > 0;

  return `
    <div>
      <div style="margin-bottom:20px">
        <div style="font-size:18px;font-weight:900;margin-bottom:4px">カテゴリ管理</div>
        <div style="font-size:12px;color:#666">種目を自由に追加・削除できます</div>
      </div>

      <div class="cat-list">${catList}</div>

      <div class="add-cat-box">
        <div class="add-cat-title">＋ 新しいカテゴリを追加</div>

        <div class="form-label">アイコン</div>
        <div class="emoji-grid">${emojiGrid}</div>

        <div class="form-label">カラー</div>
        <div class="color-grid">${colorGrid}</div>

        <div class="form-label">名前</div>
        <input type="text" class="form-input" placeholder="例：水泳、ヨガ、サイクリング…" maxlength="12"
          value="${esc(newCat.label)}"
          oninput="newCat.label=this.value; document.getElementById('add-btn').className='add-cat-btn'+(this.value.trim()?' ready':'');"
          style="margin-bottom:14px" />

        <button id="add-btn" class="add-cat-btn${canAdd?' ready':''}" onclick="addCat()">
          ${newCat.icon} カテゴリを追加する
        </button>
      </div>
    </div>`;
}

// ── actions ───────────────────────────────────────────────
function setFilter(k)   { filterActivity = k; render(); }
function setActivity(id){ formData.activityId = id; render(); }
function selEmoji(e)    { newCat.icon = e;  render(); }
function selColor(c)    { newCat.color = c; render(); }

function addRecord() {
  if (!formData.date || !formData.cost || !formData.activityId) return;
  records.push({ id: Date.now(), date: formData.date, activityId: formData.activityId, cost: Number(formData.cost), memo: formData.memo });
  records.sort((a,b)=>b.date.localeCompare(a.date));
  saveRecords();
  formData = { date: today(), activityId: formData.activityId, cost: '', memo: '' };
  showToast('✅ 記録を保存しました');
  switchView('list');
}

function deleteRecord(id) {
  if (!confirm('この記録を削除しますか？')) return;
  records = records.filter(r=>r.id!==id);
  saveRecords();
  render();
}

function addCat() {
  if (!newCat.label.trim()) return;
  const id = 'cat_' + Date.now();
  cats.push({ id, label: newCat.label.trim(), icon: newCat.icon, color: newCat.color, isDefault: false });
  saveCats();
  if (!formData.activityId) formData.activityId = id;
  newCat = { label:'', icon: EMOJIS[0], color: COLORS[0] };
  showToast('✅ カテゴリを追加しました');
  render();
}

function confirmDeleteCat(id) {
  pendingDelCatId = id;
  const cat   = getCat(id);
  const used  = records.filter(r=>r.activityId===id).length;
  const extra = used > 0 ? `<br><br>このカテゴリには <strong style="color:#FF4757">${used}件</strong> の記録があります。記録データは残りますが、カテゴリ名が表示されなくなります。` : '';

  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'del-modal';
  overlay.innerHTML = `
    <div class="modal-box">
      <div class="modal-title">カテゴリを削除</div>
      <div class="modal-msg">「${esc(cat.label)}」を削除しますか？${extra}</div>
      <div class="modal-btns">
        <button class="modal-cancel" onclick="closeModal()">キャンセル</button>
        <button class="modal-confirm" onclick="doDeleteCat()">削除する</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
}

function closeModal() {
  const m = document.getElementById('del-modal');
  if (m) m.remove();
  pendingDelCatId = null;
}

function doDeleteCat() {
  cats = cats.filter(c=>c.id!==pendingDelCatId);
  saveCats();
  if (filterActivity === pendingDelCatId) filterActivity = 'all';
  if (formData.activityId === pendingDelCatId) formData.activityId = cats[0]?.id || null;
  closeModal();
  showToast('🗑️ カテゴリを削除しました');
  render();
}

function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast'; t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 2200);
}

// ── init ──────────────────────────────────────────────────
load();
render();
</script>
</body>
</html>
